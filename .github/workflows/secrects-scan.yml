name: Secret Scan

on: 
    workflow_call:

jobs: 
    secret_scan:  
        runs-on: ubuntu-latest
        steps: 
                - name: checkout code
                  uses: actions/checkout@v4

                - name: run git leaks scanner
                  uses: gitleaks/gitleaks-action@v2
                  with:
                    fetch-depth: 0

        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} #github action manages it
